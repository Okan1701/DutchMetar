trigger:
  - master

pool:
  vmImage: ubuntu-latest

variables:
  dotnetVersion: 10.x
  nodeVersion: 24.x
  webAppWin64ArtifactName: dutchmetar-webapp-win-x64

stages:
  - stage: build
    displayName: Build
    jobs:
      - job: publishWebApp
        displayName: Publish web app
        pool:
          name: emeni-build-windows
        variables:
          - group: GithubPackages
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 10
            inputs:
              packageType: 'sdk'
              version: $(dotnetVersion)
              includePreviewVersions: false
              
          - task: UseNode@1
            displayName: Setup Node v$(nodeVersion)
            inputs:
              version: $(nodeVersion)

          - task: PowerShell@2
            displayName: Create nuget.config file
            inputs:
              targetType: 'inline'
              script: |
                $xmlContent = @"
                <?xml version="1.0" encoding="utf-8"?>
                <configuration>
                  <packageSources>
                    <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
                    <add key="github" value="https://nuget.pkg.github.com/Okan1701/index.json" />
                  </packageSources>
                  <packageSourceCredentials>
                    <github>
                        <add key="Username" value="$(UserName)" />
                        <add key="ClearTextPassword" value="$(ApiKey)" />
                    </github>
                  </packageSourceCredentials>
                </configuration>
                "@
                
                Set-Content -Path "./nuget.config" -Value $xmlContent -Encoding UTF8

          - task: DotNetCoreCLI@2
            displayName: Run solution tests
            inputs:
              command: 'test'
              projects: 'DutchMetar.slnx'
              testRunTitle: '.NET Tests'

          - task: DotNetCoreCLI@2
            displayName: Publish DutchMetar.Web.Server (win-x64)
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: './src/DutchMetar.Web.Server'
              arguments: '-c Release -r win-x64 -o $(Build.ArtifactStagingDirectory)'
              zipAfterPublish: false
              modifyOutputPath: false

          - task: PublishBuildArtifacts@1
            displayName: Upload artifacts
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: $(webAppWin64ArtifactName)
              publishLocation: 'Container'

      - job: publishHangfireImage
        displayName: Publish DutchMetar Hangfire image
        condition: ne(variables['Build.Reason'], 'PullRequest')
        variables:
          - group: GithubPackages
        
        steps:
          - task: PowerShell@2
            displayName: Create nuget.config file
            inputs:
              targetType: 'inline'
              script: |
                $xmlContent = @"
                <?xml version="1.0" encoding="utf-8"?>
                <configuration>
                  <packageSources>
                    <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
                    <add key="github" value="https://nuget.pkg.github.com/Okan1701/index.json" />
                  </packageSources>
                  <packageSourceCredentials>
                    <github>
                        <add key="Username" value="$(UserName)" />
                        <add key="ClearTextPassword" value="$(ApiKey)" />
                    </github>
                  </packageSourceCredentials>
                </configuration>
                "@
                
                Set-Content -Path "./nuget.config" -Value $xmlContent -Encoding UTF8

          - task: Docker@2
            displayName: Build & Push
            inputs:
              containerRegistry: 'Docker Hub'
              repository: 'ultimateantic/dutchmetar-jobs'
              command: 'buildAndPush'
              Dockerfile: 'src/DutchMetar.Hangfire.Host/Dockerfile'
              buildContext: '.'
              tags: 'latest'

  - stage: deploy_test
    displayName: Deploy Test
    jobs:
      - deployment: web
        environment: Test
        displayName: Deploy web app
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadSecureFile@1
                  displayName: Download appsettings
                  name: appsettingsFile
                  inputs:
                    secureFile: 'appsettings.Test.json'

                - task: CopyFiles@2
                  inputs:
                    SourceFolder: '$(appsettingsFile.path)'
                    Contents: '**'
                    TargetFolder: '$(Pipeline.Workspace)/$(webApp64ArtifactName)'

                - task: CmdLine@2
                  inputs:
                    script: 'dir'
                
                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    WebSiteName: 'test.dutchmetar.hc.emeni.nl'
                    Package: '$(Pipeline.Workspace)/$(webApp64ArtifactName)'
                    RemoveAdditionalFilesFlag: true
                    TakeAppOfflineFlag: true
                