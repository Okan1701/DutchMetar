<app-stack>
    <mat-card>
        <mat-card-content class="toolbar">
            <form [formGroup]="form">
                <mat-form-field appearance="outline" subscriptSizing="dynamic">
                    <mat-label>Target date</mat-label>
                    <input formControlName="selectedDate" placeholder="d/m/yyyy" [max]="maxDate" matInput [matDatepicker]="picker">
                    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                </mat-form-field>
            </form>
            <button matTooltip="Reset to today" mat-icon-button><mat-icon>event_repeat</mat-icon></button>
            <span>{{ airportHistory()?.history?.length ?? 0 }} results</span>
        </mat-card-content>
    </mat-card>

    <app-status-display notFoundText="No historial data found for the chosen date." loadingText="Retrieving history" [status]="loadingStatus()">
        @if (airportHistory()) {
            @if (chartOptions) {
                <mat-card>
                    <mat-card-header>
                        <mat-card-title>Temperature History</mat-card-title>
                    </mat-card-header>
                    <mat-card-content>
                        <apx-chart
                                [series]="chartOptions.series!"
                                [chart]="chartOptions.chart!"
                                [xaxis]="chartOptions.xaxis!"
                                [yaxis]="chartOptions.yaxis!"
                                [stroke]="chartOptions.stroke!"
                                [tooltip]="chartOptions.tooltip!"
                                [dataLabels]="chartOptions.dataLabels!"
                                [markers]="chartOptions.markers!"
                                [theme]="chartOptions.theme!"
                        ></apx-chart>
                    </mat-card-content>
                </mat-card>
            }
            <pre>{{ airportHistoryJson() }}</pre>
        }
    </app-status-display>
</app-stack>
